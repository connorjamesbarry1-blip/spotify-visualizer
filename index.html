<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify Visualizer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Login screen ──────────────────────────────────────────────────────── -->
  <div id="login-screen" class="screen active">
    <div class="login-card">

      <svg class="sp-logo" viewBox="0 0 168 168" aria-hidden="true" focusable="false">
        <path fill="#1ED760" d="
          M84 0C37.6 0 0 37.6 0 84s37.6 84 84 84 84-37.6 84-84S130.4 0 84 0z
          m38.6 121.1c-1.5 2.5-4.8 3.3-7.3 1.8
          -20-12.2-45.2-15-74.9-8.2-2.9.7-5.7-1.1-6.4-4
          -.7-2.9 1.1-5.7 4-6.4 32.5-7.4 60.4-4.2 82.9 9.5 2.5 1.5 3.3 4.8 1.8 7.3z
          m10.3-22.9c-1.9 3.1-5.9 4.1-9 2.2
          -22.9-14.1-57.8-18.2-84.9-9.9-3.5 1.1-7.2-.9-8.3-4.4
          -1.1-3.5.9-7.2 4.4-8.3 30.9-9.4 69.3-4.8 95.6 11.3 3.1 1.9 4.1 5.9 2.2 9z
          m.9-23.8C110.2 57.3 67.5 55.9 43.5 63.5c-4.2 1.3-8.6-1.1-9.9-5.3
          -1.3-4.2 1.1-8.6 5.3-9.9 27.7-8.4 73.7-6.8 102.8 11.4
          3.8 2.3 5 7.2 2.8 11-2.3 3.8-7.2 5-11 2.7z
        "/>
      </svg>

      <h1>Spotify Visualizer</h1>
      <p>Connect your account to watch your music come alive.</p>
      <button id="login-btn" class="btn-primary" type="button">
        Connect with Spotify
      </button>
    </div>
  </div>

  <!-- ── Visualizer screen ─────────────────────────────────────────────────── -->
  <div id="visualizer-screen" class="screen">
    <canvas id="visualizer-canvas"></canvas>

    <!-- Bottom-left: song name + artist. Hidden until a track is playing. -->
    <div id="track-info" class="track-info hidden">
      <span id="song-name"   class="song-name"></span>
      <span id="artist-name" class="artist-name"></span>
    </div>

    <!-- Shown by app.js when nothing is queued; kept minimal. -->
    <p id="not-playing" class="not-playing">Nothing playing</p>
  </div>

  <script type="module" src="src/app.js"></script>
</body>
</html>
